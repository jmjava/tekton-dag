# docgen.yaml — configuration for the documentation-generator pipeline
# See: https://github.com/jmjava/documentation-generator

repo_root: "../.."
env_file: "../../.env"

dirs:
  narration: narration
  audio: audio
  animations: animations
  terminal: terminal
  recordings: recordings

segments:
  default: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11"]
  all:
    - "01"
    - "02"
    - "03"
    - "04"
    - "05"
    - "06"
    - "07"
    - "08"
    - "09"
    - "10"
    - "11"
    - "12"
    - "13"
    - "14"

# Segment → narration file name stems (matches narration/*.md file names)
segment_names:
  "01": "01-architecture"
  "02": "02-quickstart"
  "03": "03-bootstrap-dataflow"
  "04": "04-pr-pipeline"
  "05": "05-intercept-routing"
  "06": "06-local-debug"
  "07": "07-orchestrator"
  "08": "08-multi-team-helm"
  "09": "09-results-db"
  "10": "10-newman-tests"
  "11": "11-test-trace-graph"
  "12": "12-regression-suite"
  "13": "13-management-gui-architecture"
  "14": "14-gui-tekton-extension"

# Visual source mapping — matches the VISUAL_MAP from compose.sh
# type: manim | vhs | mixed | still
visual_map:
  "01":
    type: manim
    scene: StackDAGScene
    source: StackDAGScene.mp4
  "02":
    type: vhs
    tape: 02-quickstart.tape
    source: 02-quickstart.mp4
  "03":
    type: mixed
    scene: HeaderPropagationScene
    tape: 03-bootstrap.tape
    sources:
      - HeaderPropagationScene.mp4
      - 03-bootstrap.mp4
  "04":
    type: vhs
    tape: 04-pr-pipeline.tape
    source: 04-pr-pipeline.mp4
  "05":
    type: manim
    scene: InterceptRoutingScene
    source: InterceptRoutingScene.mp4
  "06":
    type: manim
    scene: LocalDebugScene
    source: LocalDebugScene.mp4
  "07":
    type: vhs
    tape: 07-orchestrator-api.tape
    source: 07-orchestrator-api.mp4
  "08":
    type: manim
    scene: MultiTeamScene
    source: MultiTeamScene.mp4
  "09":
    type: vhs
    tape: 09-results-db.tape
    source: 09-results-db.mp4
  "10":
    type: vhs
    tape: 10-newman.tape
    source: 10-newman.mp4
  "11":
    type: mixed
    scene: BlastRadiusScene
    tape: 11-graph-tests.tape
    sources:
      - BlastRadiusScene.mp4
      - 11-graph-tests.mp4
  "12":
    type: manim
    scene: RegressionSuiteScene
    source: RegressionSuiteScene.mp4
  "13":
    type: manim
    scene: ManagementGUIArchitectureScene
    source: ManagementGUIArchitectureScene.mp4
  "14":
    type: manim
    scene: GUIExtensionScene
    source: GUIExtensionScene.mp4

# Manim rendering config
manim:
  quality: 720p30
  scenes:
    - StackDAGScene
    - HeaderPropagationScene
    - InterceptRoutingScene
    - LocalDebugScene
    - MultiTeamScene
    - BlastRadiusScene
    - RegressionSuiteScene
    - ManagementGUIArchitectureScene
    - GUIExtensionScene

# TTS config
tts:
  model: gpt-4o-mini-tts
  voice: coral
  instructions: >
    You are narrating a technical demo video about a CI/CD pipeline platform
    called tekton-dag. Speak in a calm, professional tone. Pronounce technical
    terms clearly: Tekton, Kubernetes, Helm, Newman, pytest, Neo4j, Manim.

# Concat configs for full demo files
concat:
  full-demo:
    - "01"
    - "02"
    - "03"
    - "04"
    - "05"
    - "06"
    - "07"
    - "08"
    - "09"
    - "10"
    - "11"
  full-demo-with-m12-2:
    - "01"
    - "02"
    - "03"
    - "04"
    - "05"
    - "06"
    - "07"
    - "08"
    - "09"
    - "10"
    - "11"
    - "12"
    - "13"
    - "14"

# Validation thresholds
validation:
  max_drift_sec: 2.75
  ocr:
    error_patterns:
      - "command not found"
      - "No such file"
      - "syntax error"
      - "Permission denied"
      - "bash:"
  narration_lint:
    pre_tts_deny_patterns:
      - "target duration"
      - "intended length"
      - "visual:"
      - "edit for voice"
      - "approximately \\d+ minutes"
    post_tts_deny_patterns:
      - "target duration"
      - "narration segment"
      - "script section"
      - "edit for voice"

# Wizard config
wizard:
  llm_model: gpt-4o
  system_prompt: >
    You are a technical writer creating narration scripts for demo videos about
    tekton-dag, a CI/CD pipeline platform built on Tekton. Write in plain spoken
    English suitable for text-to-speech. No markdown formatting, no headings, no
    bullet points. Conversational but professional tone, like a senior engineer
    presenting at a conference.
  exclude_patterns:
    - "**/node_modules/**"
    - "**/.pytest_cache/**"
    - "**/archive/**"
    - "**/__pycache__/**"
    - "**/animations/media/**"
    - "**/terminal/rendered/**"
    - "**/.venv/**"

# GitHub Pages
pages:
  title: "tekton-dag Demo Videos"
  description: "CI/CD pipeline platform demo recordings"
  lfs_patterns:
    - "recordings/*.mp4"
    - "audio/*.mp3"
    - "animations/media/**/*.mp4"
    - "terminal/rendered/*.mp4"
