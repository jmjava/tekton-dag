# docgen.yaml — configuration for the documentation-generator pipeline
# See: https://github.com/jmjava/documentation-generator

repo_root: "../.."
env_file: "../../.env"

dirs:
  narration: narration
  audio: audio
  animations: animations
  terminal: terminal
  recordings: recordings

segments:
  default: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "13"]
  all:
    - "01"
    - "02"
    - "03"
    - "04"
    - "05"
    - "06"
    - "07"
    - "08"
    - "09"
    - "10"
    - "11"
    - "12"
    - "13"
    - "14"
    - "15"
    - "16"
    - "17"
    - "18"

segment_names:
  "01": "01-architecture"
  "02": "02-quickstart"
  "03": "03-bootstrap-dataflow"
  "04": "04-pr-pipeline"
  "05": "05-intercept-routing"
  "06": "06-local-debug"
  "07": "07-merge-release"
  "08": "08-orchestrator"
  "09": "09-multi-team-helm"
  "10": "10-baggage-middleware"
  "11": "11-testing-ecosystem"
  "12": "12-test-trace-graph"
  "13": "13-results-db"
  "14": "14-customization"
  "15": "15-regression-suite"
  "16": "16-management-gui"
  "17": "17-extending-gui"
  "18": "18-roadmap"

visual_map:
  "01":
    type: manim
    scene: StackDAGScene
    source: StackDAGScene.mp4
  "02":
    type: vhs
    tape: 02-quickstart.tape
    source: 02-quickstart.mp4
  "03":
    type: mixed
    scene: HeaderPropagationScene
    tape: 03-bootstrap.tape
    sources:
      - HeaderPropagationScene.mp4
      - 03-bootstrap.mp4
  "04":
    type: vhs
    tape: 04-pr-pipeline.tape
    source: 04-pr-pipeline.mp4
  "05":
    type: manim
    scene: InterceptRoutingScene
    source: InterceptRoutingScene.mp4
  "06":
    type: manim
    scene: LocalDebugScene
    source: LocalDebugScene.mp4
  "07":
    type: manim
    scene: MergeReleaseScene
    source: MergeReleaseScene.mp4
  "08":
    type: vhs
    tape: 08-orchestrator-api.tape
    source: 08-orchestrator-api.mp4
  "09":
    type: manim
    scene: MultiTeamScene
    source: MultiTeamScene.mp4
  "10":
    type: manim
    scene: BaggageMiddlewareScene
    source: BaggageMiddlewareScene.mp4
  "11":
    type: vhs
    tape: 11-testing.tape
    source: 11-testing.mp4
  "12":
    type: mixed
    scene: BlastRadiusScene
    tape: 12-graph-tests.tape
    sources:
      - BlastRadiusScene.mp4
      - 12-graph-tests.mp4
  "13":
    type: vhs
    tape: 13-results-db.tape
    source: 13-results-db.mp4
  "14":
    type: manim
    scene: CustomizationScene
    source: CustomizationScene.mp4
  "15":
    type: vhs
    tape: 15-regression.tape
    source: 15-regression.mp4
  "16":
    type: manim
    scene: ManagementGUITourScene
    source: ManagementGUITourScene.mp4
  "17":
    type: manim
    scene: GUIExtensionPatternScene
    source: GUIExtensionPatternScene.mp4
  "18":
    type: manim
    scene: RoadmapScene
    source: RoadmapScene.mp4

manim:
  quality: 720p30
  scenes:
    - StackDAGScene
    - HeaderPropagationScene
    - InterceptRoutingScene
    - LocalDebugScene
    - MergeReleaseScene
    - MultiTeamScene
    - BaggageMiddlewareScene
    - BlastRadiusScene
    - CustomizationScene
    - ManagementGUITourScene
    - GUIExtensionPatternScene
    - RoadmapScene

tts:
  model: gpt-4o-mini-tts
  voice: coral
  instructions: >
    You are narrating a technical demo video about a CI/CD pipeline platform
    called tekton-dag. Speak in a calm, professional tone. Pronounce technical
    terms clearly: Tekton, Kubernetes, Helm, Newman, pytest, Neo4j, Manim.

concat:
  full-demo:
    - "01"
    - "02"
    - "03"
    - "04"
    - "05"
    - "06"
    - "07"
    - "08"
    - "09"
    - "10"
    - "11"
    - "12"
    - "13"
  full-demo-complete:
    - "01"
    - "02"
    - "03"
    - "04"
    - "05"
    - "06"
    - "07"
    - "08"
    - "09"
    - "10"
    - "11"
    - "12"
    - "13"
    - "14"
    - "15"
    - "16"
    - "17"
    - "18"
  platform-core:
    - "01"
    - "02"
    - "03"
    - "04"
    - "05"
    - "06"
    - "07"

validation:
  max_drift_sec: 2.75
  max_freeze_ratio: 0.85
  ocr:
    error_patterns:
      - "command not found"
      - "No such file"
      - "syntax error"
      - "Permission denied"
      - "bash:"
  narration_lint:
    pre_tts_deny_patterns:
      - "target duration"
      - "intended length"
      - "visual:"
      - "edit for voice"
      - "approximately \\d+ minutes"
    post_tts_deny_patterns:
      - "target duration"
      - "narration segment"
      - "script section"
      - "edit for voice"

wizard:
  llm_model: gpt-4o
  system_prompt: >
    You are a technical writer creating narration scripts for demo videos about
    tekton-dag, a CI/CD pipeline platform built on Tekton. Write in plain spoken
    English suitable for text-to-speech. No markdown formatting, no headings, no
    bullet points. Conversational but professional tone, like a senior engineer
    presenting at a conference.
  exclude_patterns:
    - "**/node_modules/**"
    - "**/.pytest_cache/**"
    - "**/archive/**"
    - "**/__pycache__/**"
    - "**/animations/media/**"
    - "**/terminal/rendered/**"
    - "**/.venv/**"

pages:
  title: "tekton-dag Demo Videos"
  description: "CI/CD pipeline platform demo recordings"
  lfs_patterns:
    - "recordings/*.mp4"
    - "audio/*.mp3"
    - "animations/media/**/*.mp4"
    - "terminal/rendered/*.mp4"
