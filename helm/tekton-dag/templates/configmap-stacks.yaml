{{- if .Values.orchestrationService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: tekton-dag-stacks
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tekton-dag.labels" . | nindent 4 }}
data:
  {{- range $path, $_ := .Files.Glob "raw/stacks/**.yaml" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
