{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tekton-dag.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tekton-dag.labels" . | nindent 4 }}
---
{{- if .Values.rbac.clusterAdmin }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tekton-dag.serviceAccountName" . }}-admin-{{ .Values.namespace }}
  labels:
    {{- include "tekton-dag.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "tekton-dag.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
{{- end }}
