# Test stack: Flask in forwarder role (M4 §1.6).
# Chain: Vue (originator) → Flask (forwarder) → Spring Boot (terminal).
# Use with validate-propagation to verify Flask forwards baggage.

name: test-stack-flask-forwarder
description: "Test: Flask as forwarder — Vue → Flask → Spring Boot"

propagation:
  header-name: x-dev-session
  baggage-key: dev-session
  strategy: w3c-baggage

defaults:
  namespace: staging
  image-registry: "${IMAGE_REGISTRY}"
  service-port: "80"
  container-port: "8080"

apps:
  - name: demo-fe
    repo: jmjava/tekton-dag-vue-fe
    role: frontend
    propagation-role: originator
    container-port: "80"
    context-dir: "."
    dockerfile: Dockerfile
    build:
      tool: npm
      runtime: vue
      node-version: "22"
      build-command: "npm install && npm run build"
    downstream:
      - analytics-api
    tests: {}

  - name: analytics-api
    repo: jmjava/tekton-dag-flask
    role: middleware
    propagation-role: forwarder
    container-port: "5000"
    context-dir: "."
    dockerfile: Dockerfile
    build:
      tool: pip
      runtime: flask
      python-version: "3.12"
      build-command: "pip install --no-cache-dir -r requirements.txt"
    downstream:
      - demo-api
    tests: {}

  - name: demo-api
    repo: jmjava/tekton-dag-spring-boot-gradle
    role: persistence
    propagation-role: terminal
    context-dir: "."
    dockerfile: Dockerfile
    build:
      tool: maven
      runtime: spring-boot
      java-version: "21"
      build-command: "mvn -B clean package -DskipTests"
    downstream: []
    tests: {}
