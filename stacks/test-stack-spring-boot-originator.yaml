# Test stack: Spring Boot in originator role (M4 §1.6).
# Chain: Spring Boot (originator) → Spring Boot (terminal).
# Use with validate-propagation to verify Spring Boot originates baggage.

name: test-stack-spring-boot-originator
description: "Test: Spring Boot as originator — Spring Boot → Spring Boot"

propagation:
  header-name: x-dev-session
  baggage-key: dev-session
  strategy: w3c-baggage

defaults:
  namespace: staging
  image-registry: "${IMAGE_REGISTRY}"
  service-port: "80"
  container-port: "8080"

apps:
  - name: release-lifecycle-demo
    repo: jmjava/tekton-dag-spring-boot
    role: frontend
    propagation-role: originator
    context-dir: "."
    dockerfile: Dockerfile
    build:
      tool: maven
      runtime: spring-boot
      java-version: "21"
      build-command: "mvn -B clean package -DskipTests"
    downstream:
      - demo-api
    tests: {}

  - name: demo-api
    repo: jmjava/tekton-dag-spring-boot-gradle
    role: persistence
    propagation-role: terminal
    context-dir: "."
    dockerfile: Dockerfile
    build:
      tool: maven
      runtime: spring-boot
      java-version: "21"
      build-command: "mvn -B clean package -DskipTests"
    downstream: []
    tests: {}
