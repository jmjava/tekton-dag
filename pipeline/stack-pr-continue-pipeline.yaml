apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: stack-pr-continue
  labels:
    app.kubernetes.io/part-of: tekton-job-standardization
    app.kubernetes.io/version: "1.0.0"
spec:
  description: >
    Continuation pipeline: skips fetch/resolve/clone/build and starts from
    deploy-intercepts. Use when the full PR pipeline failed after build-apps
    succeeded. Pass the results from the failed run as params.
    Usage: ./scripts/rerun-pr-from.sh <failed-pipelinerun-name>

  params:
    - name: stack-json
      type: string
      description: "Full stack graph JSON (from resolve-stack result of failed run)"
    - name: build-apps
      type: string
      description: "Space-separated app list (from resolve-stack result)"
    - name: propagation-chain
      type: string
      description: "Propagation chain (from resolve-stack result)"
    - name: intercept-header-value
      type: string
      description: "Intercept header value (from resolve-stack result)"
    - name: app-list
      type: string
      description: "Ordered app list (from resolve-stack result)"
    - name: entry-app
      type: string
      description: "Entry-point app (from resolve-stack result)"
    - name: built-images
      type: string
      description: "JSON map of app → image URI (from build-apps result)"
    - name: intercept-backend
      type: string
      description: "Which intercept backend was used: telepresence or mirrord"
      default: "telepresence"
    - name: bumped-versions
      type: string
      description: "JSON map of app → version (from bump-rc-version result)"
    - name: git-url
      type: string
      description: "Platform repo URL (for push-version-commit)"
    - name: git-revision
      type: string
      description: "Branch, tag, or SHA"
    - name: changed-app
      type: string
      description: "App being tested (for test-plan query)"
      default: ""

  workspaces:
    - name: shared-workspace
      description: "Shared PVC — must be the SAME PVC from the failed run (still has source + built artifacts)"
    - name: ssh-key
      description: "SSH key for git push"

  results:
    - name: test-summary
      value: $(tasks.run-tests.results.test-summary)

  tasks:
    - name: deploy-intercepts-telepresence
      when:
        - input: $(params.intercept-backend)
          operator: in
          values: ["telepresence"]
      taskRef:
        name: deploy-stack-intercepts
      params:
        - name: stack-json
          value: $(params.stack-json)
        - name: build-apps
          value: $(params.build-apps)
        - name: propagation-chain
          value: $(params.propagation-chain)
        - name: built-images
          value: $(params.built-images)
        - name: intercept-header-value
          value: $(params.intercept-header-value)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace

    - name: deploy-intercepts-mirrord
      when:
        - input: $(params.intercept-backend)
          operator: in
          values: ["mirrord"]
      taskRef:
        name: deploy-intercept-mirrord
      params:
        - name: stack-json
          value: $(params.stack-json)
        - name: build-apps
          value: $(params.build-apps)
        - name: propagation-chain
          value: $(params.propagation-chain)
        - name: built-images
          value: $(params.built-images)
        - name: intercept-header-value
          value: $(params.intercept-header-value)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace

    - name: deploy-intercepts-result
      taskRef:
        name: deploy-intercepts-result
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
      runAfter:
        - deploy-intercepts-telepresence
        - deploy-intercepts-mirrord

    - name: validate-propagation
      taskRef:
        name: validate-stack-propagation
      params:
        - name: stack-json
          value: $(params.stack-json)
        - name: propagation-chain
          value: $(params.propagation-chain)
        - name: build-apps
          value: $(params.build-apps)
        - name: intercept-header-value
          value: $(params.intercept-header-value)
      runAfter:
        - deploy-intercepts-result

    - name: query-test-plan
      taskRef:
        name: query-test-plan
      params:
        - name: changed-app
          value: $(params.changed-app)
      runAfter:
        - validate-propagation

    - name: run-tests
      taskRef:
        name: run-stack-tests
      params:
        - name: stack-json
          value: $(params.stack-json)
        - name: app-list
          value: $(params.app-list)
        - name: entry-app
          value: $(params.entry-app)
        - name: propagation-chain
          value: $(params.propagation-chain)
        - name: build-apps
          value: $(params.build-apps)
        - name: intercept-header-value
          value: $(params.intercept-header-value)
        - name: tests-to-run
          value: $(tasks.query-test-plan.results.tests-to-run)
        - name: unmapped-area
          value: $(tasks.query-test-plan.results.unmapped-area)
        - name: apps-to-test
          value: $(tasks.query-test-plan.results.apps-to-test)
      workspaces:
        - name: test-source
          workspace: shared-workspace
      runAfter:
        - query-test-plan

    - name: push-version-commit
      taskRef:
        name: git-cli
      params:
        - name: GIT_SCRIPT
          value: |
            git config --global --add safe.directory /workspace/source
            URL=$(git remote get-url origin)
            REPO=${URL##*github.com/}
            REPO=${REPO##*github.com:}
            REPO=${REPO%.git}
            git remote set-url origin "git@github.com:${REPO}.git"
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true
            git push origin HEAD:refs/heads/$(params.git-revision)
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: ssh-directory
          workspace: ssh-key
      runAfter:
        - run-tests

  finally:
    - name: cleanup
      taskRef:
        name: cleanup-stack-pods
      params:
        - name: deployed-pods
          value: $(tasks.deploy-intercepts-result.results.deployed-pods)
        - name: stack-json
          value: $(params.stack-json)
        - name: intercept-backend
          value: $(params.intercept-backend)
